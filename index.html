<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Typex demo</title>
  <style>
    #editor-root {
      margin: 4% 10%;
    }
  </style>
</head>

<body>
  <div id="demo-app">
    <div class="demo-pane demo-pane--editor">
      <div class="demo-pane__header">Rich Text Editor</div>
      <div id="editor-root"></div>
      <label class="demo-pane__label" for="markdown-input">Markdown Input</label>
      <textarea id="markdown-input" class="demo-markdown-input" placeholder="# Markdown\n\nType here to update the live preview."></textarea>
    </div>
    <div class="demo-pane demo-pane--preview">
      <div class="demo-pane__header">Live Preview</div>
      <div id="preview-root" class="demo-preview demo-preview--empty"></div>
    </div>
  </div>
</body>

</html>
